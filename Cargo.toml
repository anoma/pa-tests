[workspace]
members = [
  "crates/transfer_app",
  "crates/transfer_library_v2",
  "crates/database",
  "crates/transfer_web",
  "crates/transfer_orchestrator",
  "crates/transfer_benchmark",
  "crates/pa-integration-test-harness",
]
resolver = "3"

[workspace.package]
authors = ["Heliax <hello@heliax.dev>"]
edition = "2024"
license = "GPL-3.0"
readme = "README.md"
version = "2.0.0-rc2"

[workspace.dependencies]
alloy = { version = "1.1.2", features = [
  "full",
  "json",
  "signer-local",
  "node-bindings",
] }
alloy-chains = "0.2.18"
alloy-primitives = "1.0.23"
alloy-sol-types = "1.0.23"
anoma-pa-evm-bindings = "2.1.0"
anoma-rm-risc0 = { version = "1.1.1", default-features = false }
anoma-rm-risc0-gadgets = "1.1.1"
anomapay-erc20-forwarder-bindings = "2.1.0"
anyhow = "1.0"
async-trait = "0.1.89"
base64 = "0.22.1"
bincode = "1.3.3"
chrono = "0.4.42"
clap = { version = "4", features = ["derive", "env"] }
diesel = { version = "~2.3.0", features = ["postgres", "uuid", "serde_json"] }
diesel-async = { version = "0.7.4", features = ["postgres", "deadpool"] }
diesel-derive-enum = { version = "3.0.0-beta.1", features = ["postgres"] }
diesel_migrations = "2.3.0"
dotenv = "0.15.0"
enum_dispatch = "0.3"
futures = "0.3.31"
hex = "0.4"
itertools = "0.14.0"
k256 = { version = "0.13", default-features = false }
lazy_static = "1.5.0"
mockall = "0.14.0"
moka = { version = "0.12", features = ["future"] }
rand = "0.9.2"
reqwest = "0.12"
risc0-zkvm = "3.0.3"
rocket = { version = "0.5", features = ["json", "uuid"] }
rocket_cors = "0.6"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_with = { version = "3.0", features = ["hex", "base64"] }
serial_test = "3.2.0"
strum = "0.27.2"
testcontainers = "0.26"
testcontainers-modules = { version = "0.14", features = ["postgres"] }
thiserror = "2.0.17"
tokio = { version = "1.48", features = ["rt-multi-thread"] }
tokio-util = "0.7"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
typetag = "0.2.21"
utoipa = { version = "5", features = ["uuid"] }
utoipa-swagger-ui = { version = "9", features = ["rocket"] }
uuid = { version = "1.0", features = ["v7", "serde"] }
vergen = { version = "9.0.6", features = ["build", "cargo", "rustc", "si"] }
vergen-git2 = { version = "9.0.6", features = [
  "build",
  "cargo",
  "rustc",
  "si",
] }

autometrics = { version = "2", features = ["prometheus-exporter"] }
axum = "0.8"
heliax-ap-orchestrator-sdk = "0.14.0"
mockito = "1.7"
prometheus = "0.13"
